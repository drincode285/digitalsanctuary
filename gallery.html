<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Digital Sanctuary | Gallery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        :root {
            --brand-brown: #5D4037;
            --accent-brown: #A67B5B;
            --bg-cream: #FDF8F5;
        }
        body { background-color: var(--bg-cream); color: var(--brand-brown); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .cursive { font-family: 'Dancing Script', cursive; }
        
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(93, 64, 55, 0.05);
        }

        /* Polaroid/Instax Style */
        .polaroid-card {
            background: white;
            padding: 12px 12px 45px 12px;
            box-shadow: 0 10px 20px rgba(93, 64, 55, 0.15);
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .polaroid-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.2;
            pointer-events: none;
        }

        .polaroid-card:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 50;
            box-shadow: 0 20px 40px rgba(93, 64, 55, 0.25);
        }

        .bg-grid {
            background-image: radial-gradient(var(--accent-brown) 0.8px, transparent 0.8px);
            background-size: 30px 30px;
            opacity: 0.1;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-cream); }
        ::-webkit-scrollbar-thumb { background: var(--accent-brown); border-radius: 10px; }
    </style>
</head>
<body x-data="galleryApp" x-init="init()" class="min-h-screen">

    <div class="bg-grid"></div>

    <audio id="gallery-music" loop>
        <source src="assets/music/gallery-music.mp3" type="audio/mpeg">
    </audio>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <div class="flex flex-col items-center mb-16">
            <a href="index.html" class="mb-8 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/50 text-[#A67B5B] text-xs font-bold tracking-widest hover:bg-white transition-all shadow-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK TO SANCTUARY
            </a>
            <h1 class="cursive text-7xl text-[#5D4037]">Our Memories</h1>
            <p class="text-[#A67B5B] uppercase tracking-[0.3em] text-[10px] mt-4 font-semibold italic">Collection of our favorite moments</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <template x-for="album in albums" :key="album.id">
                <div @click="openAlbum(album)" class="glass overflow-hidden cursor-pointer group hover:shadow-2xl transition-all duration-500">
                    <div class="h-64 overflow-hidden relative">
                        <img :src="album.cover" :alt="album.name" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-all"></div>
                    </div>
                    <div class="p-6 flex justify-between items-center bg-white/40">
                        <span class="font-semibold text-sm tracking-widest uppercase opacity-80" x-text="album.name"></span>
                        <div class="p-2 bg-[#A67B5B] text-white rounded-full">
                            <i data-lucide="heart" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="activeAlbum" x-cloak 
             class="fixed inset-0 z-50 bg-[#FDF8F5]/98 backdrop-blur-2xl flex flex-col p-4 md:p-10"
             x-transition:enter="transition duration-300"
             x-transition:enter-start="opacity-0">
            
            <div class="flex justify-between items-center mb-12 max-w-6xl mx-auto w-full">
                <div>
                    <h2 class="cursive text-5xl text-[#5D4037]" x-text="activeAlbum?.name"></h2>
                    <p class="text-[10px] text-[#A67B5B] tracking-[0.4em] uppercase mt-2 font-bold">Instax Collection</p>
                </div>
                <button @click="activeAlbum = null" class="p-4 bg-[#5D4037] text-white rounded-full hover:rotate-90 transition-all duration-500 shadow-lg">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto max-w-6xl mx-auto w-full pb-32 px-4">
                <div class="columns-1 sm:columns-2 lg:columns-3 gap-12 space-y-16">
                    <template x-if="activeAlbum" x-for="(img, index) in activeAlbum.images" :key="index">
                      <div x-if="img && img.trim() !== ''" class="break-inside-avoid pt-4">
                          <div class="polaroid-card" :style="`transform: rotate(${index % 2 === 0 ? (Math.random() * 5 + 2) : -(Math.random() * 5 + 2)}deg)`">
                              
                              <div class="bg-gray-200 aspect-[4/5] overflow-hidden">
                                  <img :src="img" class="w-full h-full object-cover" @error="$el.closest('.break-inside-avoid').remove()">
                              </div>
                              
                              <div class="absolute bottom-4 left-0 w-full text-center">
                                  <span class="cursive text-[#A67B5B] text-xl opacity-60" x-text="activeAlbum.name"></span>
                              </div>
                          </div>
                      </div>
                  </template>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('galleryApp', () => ({
                activeAlbum: null,
                
                // MGA ALBUMS AT IMAGES
                albums: [
                    { 
                        id: 1, 
                        name: 'The Beginning', 
                        cover: 'assets/images/album1-cover.jpg', 
                        images: ['assets/images/img1.jpg', 'assets/images/img2.jpg', 'assets/images/img3.jpg'] 
                    },
                    { 
                        id: 2, 
                        name: 'Our Travels', 
                        cover: 'assets/images/album2-cover.jpg', 
                        images: ['assets/images/img4.jpg', 'assets/images/img5.jpg'] 
                    },
                    { 
                        id: 3, 
                        name: 'Random Joys', 
                        cover: 'assets/images/album3-cover.jpg', 
                        images: ['assets/images/img6.jpg', 'assets/images/img7.jpg', 'assets/images/img8.jpg','assets/images/img9.jpg'] 
                    }
                ],

                init() {
                    lucide.createIcons();
                    
                    const music = document.getElementById('gallery-music');
                    if (music) {
                        music.volume = 0.8;
                        // To bypass autoplay block, play music on first click/interaction
                        window.addEventListener('click', () => {
                            if(music.paused) music.play();
                        }, { once: true });
                    }
                },

                openAlbum(album) {
                    this.activeAlbum = album;
                    // Reset scroll to top when opening an album
                    document.querySelector('.overflow-y-auto')?.scrollTo(0,0);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            }));
        });
    </script>
</body>
</html>
